<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spike Creations — Login (Off-White Theme Preview)</title>
<style>
  :root{
    --bg: #F3EFE6;        /* linen off-white */
    --panel: #FBF9F4;     /* card surface, slightly lighter than bg */
    --ink: #2A2620;       /* near-black warm text */
    --dim: #8A8172;       /* muted secondary text */
    --line: #E3DCC9;      /* hairline borders */
    --rust: #A8532E;      /* primary accent — deeper, less generic than default terracotta */
    --rust-dark: #8B4324;
    --stitch: #C9BFA8;    /* dashed "stitch line" motif */
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(42,38,32,0.045) 1px, transparent 0);
    background-size: 18px 18px;
    color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 24px;
  }
  .wrap{width:100%;max-width:380px;}
  .brandrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
  .mark{
    width:40px;height:40px;border-radius:8px;
    background:var(--rust);
    display:flex;align-items:center;justify-content:center;
    color:#FBF9F4;font-family:Arial,sans-serif;font-weight:bold;font-size:15px;letter-spacing:0.5px;
    flex-shrink:0;
  }
  h1{
    font-size:22px;letter-spacing:3px;margin:0;text-align:center;
    font-family:Arial,Helvetica,sans-serif;font-weight:700;color:var(--ink);
  }
  .tag{
    text-align:center;color:var(--dim);font-family:Arial,sans-serif;
    font-size:11px;letter-spacing:2.5px;text-transform:uppercase;margin-top:6px;margin-bottom:28px;
  }
  .stitch{
    border:none;border-top:1px dashed var(--stitch);
    width:64px;margin:0 auto 28px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:30px 28px 26px;
    box-shadow: 0 1px 2px rgba(42,38,32,0.04), 0 8px 24px rgba(42,38,32,0.06);
  }
  label{
    display:block;font-family:Arial,sans-serif;font-size:10.5px;letter-spacing:1.2px;
    text-transform:uppercase;color:var(--dim);margin-top:18px;margin-bottom:6px;
  }
  label:first-of-type{margin-top:0;}
  input{
    width:100%;font-family:Arial,sans-serif;font-size:15px;
    background:#fff;border:1px solid var(--line);border-radius:4px;
    padding:11px 12px;color:var(--ink);
  }
  input::placeholder{color:#B8AF9E;}
  input:focus{
    outline:none;border-color:var(--rust);
    box-shadow:0 0 0 3px rgba(168,83,46,0.12);
  }
  button{
    width:100%;margin-top:24px;
    background:var(--rust);color:#FBF9F4;border:none;border-radius:4px;
    padding:13px;font-family:Arial,sans-serif;font-weight:700;font-size:12.5px;
    letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
    transition:background 0.15s ease;
  }
  button:hover{background:var(--rust-dark);}
  .footnote{
    text-align:center;color:var(--dim);font-family:Arial,sans-serif;
    font-size:11px;margin-top:22px;line-height:1.6;
  }
</style>
</head>
