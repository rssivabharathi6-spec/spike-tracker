<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spike Creations — Floor Activity Tracker</title>
<style>
  :root{
    --bg:#F6F1E7; --panel:#FFFFFF; --panel2:#EFE7D8; --cream:#2B2620;
    --amber:#C87D2E; --brick:#AF4335; --green:#4C7A4C; --border:#E2D8C4; --dim:#8B8172; --ink:#211D17;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:Arial,Helvetica,sans-serif;}
  body.login-mode{
    background-color:var(--bg);
    background-image:
      repeating-linear-gradient(45deg, rgba(200,125,46,0.09) 0, rgba(200,125,46,0.09) 2px, transparent 2px, transparent 13px),
      repeating-linear-gradient(-45deg, rgba(175,67,53,0.06) 0, rgba(175,67,53,0.06) 2px, transparent 2px, transparent 13px),
      repeating-linear-gradient(0deg, rgba(43,38,32,0.035) 0, rgba(43,38,32,0.035) 1px, transparent 1px, transparent 26px);
  }
  .login-card{position:relative;}
  .login-card::before{
    content:"";position:absolute;left:14px;right:14px;top:-1px;height:1px;
    background-image:repeating-linear-gradient(90deg, var(--amber) 0, var(--amber) 6px, transparent 6px, transparent 12px);
    opacity:.55;
  }
  .weave-strip{
    height:10px;margin:18px auto 0;max-width:220px;border-radius:2px;
    background-image:repeating-linear-gradient(45deg, var(--amber) 0, var(--amber) 5px, var(--panel2) 5px, var(--panel2) 10px);
    opacity:.7;
  }
  .wrap{max-width:640px;margin:0 auto;padding:16px;}
  h1{font-size:28px;letter-spacing:2px;margin:0;}
  .tag{color:var(--amber);font-size:12px;letter-spacing:2px;text-transform:uppercase;}
  input,select,textarea,button{font-family:inherit;font-size:15px;}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--cream);border-radius:4px;padding:10px;margin-top:4px;}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-top:12px;}
  button{cursor:pointer;border:none;border-radius:4px;padding:12px;font-weight:bold;}
  .btn-primary{background:var(--amber);color:#FFF8EF;width:100%;margin-top:16px;text-transform:uppercase;}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--dim);padding:8px 10px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:20px;margin-top:20px;}
  .err{color:var(--brick);margin-top:10px;font-size:13px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;}
  .tab{padding:10px 12px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;font-size:13px;}
  .tab.active{color:var(--amber);border-color:var(--amber);}
  .entry{background:var(--panel);border:1px solid var(--border);border-left:4px solid var(--amber);border-radius:3px;padding:12px;margin-bottom:8px;}
  .entry .meta{font-size:12px;color:var(--dim);margin-top:8px;}
  .entry .remarks{margin-top:8px;font-size:12px;color:var(--dim);font-style:italic;border-top:1px dashed var(--border);padding-top:6px;}
  .chip{display:inline-block;border:1px solid var(--amber);color:var(--amber);border-radius:12px;padding:4px 10px;font-size:11px;margin:2px;cursor:pointer;}
  .chip.active{background:var(--amber);color:#FFF8EF;}
  .code{font-family:monospace;font-weight:bold;border:1px solid;border-radius:3px;padding:2px 6px;margin-right:6px;font-size:11px;color:var(--amber);border-color:var(--amber);}
  .center{text-align:center;padding:40px 20px;color:var(--dim);}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
  .summary-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center;}
  .summary-card .big{font-size:22px;}
  .summary-card .small{font-size:9.5px;color:var(--dim);margin-top:4px;}
  .dept-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:10px 12px;margin-bottom:6px;}
  .ticker{background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap;padding:8px 0;font-family:monospace;font-size:12px;color:var(--dim);}
  .footer-note{margin-top:16px;font-size:11px;color:var(--dim);text-align:center;line-height:1.6;}
  .dl-row{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);}
  .dl-btn{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);border:1px solid var(--border);border-radius:3px;padding:4px 8px;cursor:pointer;background:transparent;}
  .dl-btn:hover{color:var(--amber);border-color:var(--amber);}
  .dl-btn:disabled{opacity:.5;cursor:default;}
  .report-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:18px;}
  .report-card h3{margin:0 0 4px;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);}
  .report-card p{margin:0 0 12px;font-size:12px;color:var(--dim);}
  .report-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .report-actions .dl-btn{padding:8px 12px;font-size:11.5px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

   ----------------------------------------------------------
   No server, no backend, no build tools. Just open this file
   in a browser.

   - All data lives only in this browser tab's memory.
   - Refreshing the page resets everything back to the seed data.
   - "Login" just checks against a hardcoded list below — there is
     no real security here, it's a UI demo only.
   - Multiple people can't share data with this version; each
     person who opens the file gets their own private, temporary copy.
========================================================== */

// section's own department list — this is deliberate, per how the
// department's role was defined.
function accessibleSections(user) {
  if (user.department === "PLANNING") return SECTIONS;
  return SECTIONS.filter(s => s.depts.includes(user.department));
}

// Planning can submit to every section regardless of fillDepts (see the
// "Planning gets all sections" rule above). Everyone else can only submit
// if their department is explicitly listed in that section's fillDepts —
// otherwise they can see the section's entries but not add new ones.
function canFillSection(user, section) {
  return user.department === "PLANNING" || section.fillDepts.includes(user.department);
}

async function apiFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(authToken ? { Authorization: "Bearer " + authToken } : {}),
      ...(options.headers || {}),
    },
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    throw new Error((data && data.error) || `Request failed (${res.status})`);
  }
  return data;
}

// Like apiFetch, but for multipart/form-data submissions (file uploads).
// The browser sets its own Content-Type (with the multipart boundary), so
// unlike apiFetch this must NOT set Content-Type manually.
async function apiFetchForm(path, formData) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: {
      ...(authToken ? { Authorization: "Bearer " + authToken } : {}),
    },
    body: formData,
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    throw new Error((data && data.error) || `Request failed (${res.status})`);
  }
  return data;
}

// Downloads a Word/Excel export. Uses fetch (not a plain <a href>) because
// the route needs the Authorization: Bearer header, then turns the response
// into a blob the browser can save.
async function downloadExport(path, fallbackName, triggerEl) {
  const originalText = triggerEl ? triggerEl.textContent : null;
  if (triggerEl) { triggerEl.disabled = true; triggerEl.textContent = "..."; }
  try {
    const res = await fetch(API_BASE + path, {
      headers: { Authorization: "Bearer " + authToken },
    });
    if (!res.ok) {
      let msg = "Download failed.";
      try { const data = await res.json(); msg = data.error || msg; } catch (e) { /* no body */ }
      throw new Error(msg);
    }
    const blob = await res.blob();
    const disposition = res.headers.get("Content-Disposition") || "";
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : fallbackName;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    alert(err.message || "Couldn't download the file.");
  } finally {
    if (triggerEl) { triggerEl.disabled = false; triggerEl.textContent = originalText; }
  }
}

// Loads the feed and every section this user can see. Called right after
// login (and again after every submit) so the UI always reflects the
// server's copy of the data.
async function loadAllData() {
  const entriesRes = await apiFetch("/entries");
  entries = entriesRes.entries;

  const mySections = accessibleSections(session);
  const sectionResults = await Promise.all(
    mySections.map(s =>
      apiFetch(`/sections/${s.id}/entries`).then(r => r.entries.map(e => ({ ...e, sectionId: s.id })))
    )
  );
  sectionEntries = sectionResults.flat();
}

// -------------------- Actions --------------------
async function doLogin(username, password) {
  const errEl = document.getElementById("loginErr");
  errEl.textContent = "";
  const btn = document.querySelector("#loginForm button");
  if (btn) { btn.disabled = true; btn.textContent = "Signing in..."; }
  try {
    const res = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({ username, password }),
    });
    authToken = res.token;
    session = res.user;
    localStorage.setItem("spike_token", authToken);
    localStorage.setItem("spike_user", JSON.stringify(session));

    await loadAllData();
    view = session.isAdmin ? "admin" : "feed";
    const mySections = accessibleSections(session);
    activeSectionId = mySections.length ? mySections[0].id : null;
    render();
  } catch (err) {
    errEl.textContent = err.message || "Username or password doesn't match.";
    if (btn) { btn.disabled = false; btn.textContent = "Sign In"; }
  }
}

function logout() {
  session = null;
  authToken = null;
  entries = [];
  sectionEntries = [];
  view = "feed";
  localStorage.removeItem("spike_token");
  localStorage.removeItem("spike_user");
  render();
}

// Shows "Signing in as: <name> — <dept>" under the username field as soon
// as a recognized username is typed, before the password is even entered.
// Debounced so it doesn't fire an API call on every keystroke, and guards
// against out-of-order responses if the field changes again mid-request.
let whoisRequestId = 0;
function wireWhoisPreview() {
  const usernameEl = document.getElementById("username");
  const previewEl = document.getElementById("whoisPreview");
  if (!usernameEl || !previewEl) return;

  let debounceTimer = null;
  usernameEl.addEventListener("input", () => {
    const value = usernameEl.value.trim();
    if (debounceTimer) clearTimeout(debounceTimer);
    if (!value) { previewEl.textContent = ""; return; }
    debounceTimer = setTimeout(() => runWhoisLookup(value, previewEl), 350);
  });
}

async function runWhoisLookup(username, previewEl) {
  const requestId = ++whoisRequestId;
  try {
    const res = await fetch(`${API_BASE}/auth/whois?username=${encodeURIComponent(username)}`);
    const data = await res.json();
    if (requestId !== whoisRequestId) return; // a newer keystroke has since fired
    if (data && data.found) {
      previewEl.textContent = `Signing in as: ${data.fullName} — ${data.department}`;
      previewEl.style.color = "var(--amber)";
    } else {
      previewEl.textContent = "";
    }
  } catch (err) {
    if (requestId !== whoisRequestId) return;
    previewEl.textContent = "";
  }
}

// `payload` is either a plain object (JSON path, no attachment) or a
// FormData instance (multipart path, used when an attachment was chosen).
async function submitEntry(payload) {
  const errEl = document.getElementById("entryErr");
  const btn = document.querySelector("#entryForm button");
  try {
    if (btn) { btn.disabled = true; btn.textContent = "Submitting..."; }
    if (payload instanceof FormData) {
      await apiFetchForm("/entries", payload);
    } else {
      await apiFetch("/entries", { method: "POST", body: JSON.stringify(payload) });
    }
    await loadAllData();
    view = "feed";
    render();
  } catch (err) {
    if (errEl) errEl.textContent = err.message || "Couldn't submit entry.";
    if (btn) { btn.disabled = false; btn.textContent = "Submit Entry"; }
  }
}

// `payload` is either a plain values object (JSON path) or a FormData
// instance (multipart path, used when the section has a file field).
async function submitSectionEntry(sectionId, payload) {
  const errEl = document.getElementById("sectionErr");
  const btn = document.querySelector("#sectionForm button");
  try {
    if (btn) { btn.disabled = true; btn.textContent = "Submitting..."; }
    if (payload instanceof FormData) {
      await apiFetchForm(`/sections/${sectionId}/entries`, payload);
    } else {
      await apiFetch(`/sections/${sectionId}/entries`, {
        method: "POST",
        body: JSON.stringify({ values: payload }),
      });
    }
    await loadAllData();
    render();
  } catch (err) {
    if (errEl) errEl.textContent = err.message || "Couldn't submit entry.";
    if (btn) { btn.disabled = false; btn.textContent = "Submit Entry"; }
  }
}

// -------------------- Rendering --------------------
function render() {
  const app = document.getElementById("app");
  if (!session) {
    document.body.classList.add("login-mode");
    app.innerHTML = loginHtml();
    document.getElementById("loginForm").onsubmit = (e) => {
      e.preventDefault();
      doLogin(
        document.getElementById("username").value.trim(),
        document.getElementById("password").value
      );
    };
    wireWhoisPreview();
    return;
  }
  document.body.classList.remove("login-mode");
  app.innerHTML = mainHtml();
  wireMainEvents();
}

  let tabs = `<div class="tab ${view === "feed" ? "active" : ""}" data-tab="feed">Factory Feed</div>`;
  if (canUseGenericLog) tabs += `<div class="tab ${view === "mine" ? "active" : ""}" data-tab="mine">My Dept</div>`;
  if (canUseGenericLog) tabs += `<div class="tab ${view === "new" ? "active" : ""}" data-tab="new">+ New Entry</div>`;
  if (mySections.length) tabs += `<div class="tab ${view === "sections" ? "active" : ""}" data-tab="sections">Sections</div>`;
  if (isAdmin) tabs += `<div class="tab ${view === "admin" ? "active" : ""}" data-tab="admin">Dashboard</div>`;

  let body = "";
  if (view === "new" && canUseGenericLog) body = newEntryFormHtml() + deptEntriesReferenceHtml(deptList);
  else if (view === "feed") body = tickerHtml() + chipsHtml() + feedHtml(feedList, true, filterDept === "all" ? session.department : null);
  else if (view === "mine" && canUseGenericLog) body = feedHtml(mineList, false);
  else if (view === "sections" && mySections.length) body = sectionsAreaHtml(mySections);
  else if (view === "admin" && isAdmin) body = dashboardHtml();

  return `
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="${LOGO_DATA_URI}" alt="Spike Creations" style="width:34px;height:34px;border-radius:4px;object-fit:cover;flex-shrink:0;">
        <div>
          <h1 style="font-size:18px;">SPIKE CREATIONS</h1>
          <div style="font-size:15px;font-weight:bold;color:var(--ink);margin-top:3px;">${escapeHtml(session.fullName)}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:1px;">${deptMeta(session.department).label}${isAdmin ? " · All Access" : ""}</div>
        </div>
      </div>
      <button class="btn-secondary" id="logoutBtn">Logout</button>
    </div>
    <div class="tabs">${tabs}</div>
    <div id="bodyArea">${body}</div>
  `;
}

function tickerHtml() {
  const start = todayStartMs();
  const today = entries.filter(e => e.createdAt >= start).sort((a,b) => b.createdAt - a.createdAt).slice(0, 12);
  if (!today.length) return "";
  const items = today.map(e => {
    const d = deptMeta(e.department);
    const shortTask = e.task.length > 40 ? e.task.slice(0, 40) + "…" : e.task;
    return `<span style="margin-right:28px;"><b style="color:var(--amber);">${d.code}</b> ${escapeHtml(e.worker)} logged ${e.quantity} ${e.unit} — ${escapeHtml(shortTask)}</span>`;
  }).join("");
  return `<div class="ticker">${items}</div>`;
}

// Puts the logged-in user's own department first, wherever departments are
// listed for that user (filter chips, feed ordering) — everyone else stays
// in the normal factory-floor order.
function orderedDepartments() {
  if (!session) return DEPARTMENTS;
  const mineIdx = DEPARTMENTS.findIndex(d => d.id === session.department);
  if (mineIdx <= 0) return DEPARTMENTS;
  const mine = DEPARTMENTS[mineIdx];
  return [mine, ...DEPARTMENTS.filter(d => d.id !== session.department)];
}

function chipsHtml() {
  let html = `<div style="margin:10px 0;"><span class="chip ${filterDept === "all" ? "active" : ""}" data-dept="all">ALL</span>`;
  orderedDepartments().forEach(d => {
    html += `<span class="chip ${filterDept === d.id ? "active" : ""}" data-dept="${d.id}">${d.code}</span>`;
  });
  html += "</div>";
  return html;
}

// `prioritizeDept`, when given, floats that department's entries to the top
// of the list (each group still newest-first) — used on the "all
// departments" Factory Feed view so a user's own department shows first.
function feedHtml(list, showDept, prioritizeDept) {
  if (!list.length) return `<div class="center">No entries yet. Log the day's work using + New Entry.</div>`;
  let sorted;
  if (prioritizeDept) {
    const mine = list.filter(e => e.department === prioritizeDept).sort((a, b) => b.createdAt - a.createdAt);
    const rest = list.filter(e => e.department !== prioritizeDept).sort((a, b) => b.createdAt - a.createdAt);
    sorted = [...mine, ...rest];
  } else {
    sorted = [...list].sort((a, b) => b.createdAt - a.createdAt);
  }
  return sorted.map(e => {
    const d = deptMeta(e.department);
    const time = new Date(e.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    return `
      <div class="entry">
        <div style="display:flex;justify-content:space-between;gap:8px;">
          <div>${showDept ? `<span class="code">${d.code}</span>` : ""}<b>${escapeHtml(e.task)}</b></div>
          <div style="font-size:11px;color:var(--dim);flex-shrink:0;">${time}</div>
        </div>
        <div class="meta">QTY ${e.quantity} ${e.unit} · TIME ${e.timeTakenMinutes} min · WORKER ${escapeHtml(e.worker)}${e.line && e.line !== "-" ? " · LINE " + e.line : ""}${e.styleNumber ? " · STYLE " + escapeHtml(e.styleNumber) : ""}${e.finishingDate ? " · FINISH " + escapeHtml(e.finishingDate) : ""}</div>
        ${e.remarks ? `<div class="remarks">"${escapeHtml(e.remarks)}"</div>` : ""}
        ${e.attachment && e.attachment.url ? `<div class="meta" style="margin-top:6px;"><a href="${escapeHtml(e.attachment.url)}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:underline;">📎 ${escapeHtml(e.attachment.originalName || "attachment")}</a></div>` : ""}
        <div class="dl-row">
          <button type="button" class="dl-btn" data-dl-entry="${e.id}" data-dl-fmt="docx">⬇ Word</button>
          <button type="button" class="dl-btn" data-dl-entry="${e.id}" data-dl-fmt="xlsx">⬇ Excel</button>
        </div>
      </div>
    `;
  }).join("");
}

function newEntryFormHtml() {
  const d = deptMeta(session.department);
  const unitOptions = UNITS.map(u => `<option>${u}</option>`).join("");
  const lineOptions = LINES.map(l => `<option>${l}</option>`).join("");
  const usesTimeUnitSelector = TIME_UNIT_DEPTS.includes(session.department);
  const isProduction = session.department === "PRODUCTION";

  const timeField = usesTimeUnitSelector ? `
        <label>Time taken</label>
        <div style="display:flex;gap:8px;">
          <input id="f_time" type="number" min="0" step="0.1" required style="flex:1;">
          <select id="f_time_unit" style="width:110px;">
            <option value="mins">mins</option>
            <option value="hrs">hrs</option>
            <option value="days">days</option>
          </select>
        </div>
  ` : `
        <label>Time taken (min)</label>
        <input id="f_time" type="number" min="0" required>
  `;

  const finishingDateField = isProduction ? `
        <label>Finishing Date</label>
        <input id="f_finishing_date" type="date">
  ` : "";

  return `
    <div class="card">
      <h3><span class="code">${d.code}</span>LOG ${d.label.toUpperCase()} WORK</h3>
      <form id="entryForm">
        <label>Task / activity</label>
        <input id="f_task" required placeholder="e.g. Stitching sleeve attach — Style SC-204">
        <label>Quantity</label>
        <input id="f_qty" type="number" min="0" required>
        <label>Unit</label>
        <select id="f_unit">${unitOptions}</select>
        ${timeField}
        <label>Line</label>
        <select id="f_line">
          <option value="-">N/A</option>
          ${lineOptions}
        </select>
        <label>Style / PO number (optional)</label>
        <input id="f_style" placeholder="e.g. SC-204">
        ${finishingDateField}
        <label>Worker / assigned to</label>
        <input id="f_worker" value="${escapeHtml(session.fullName)}">
        <label>Remarks (optional)</label>
        <textarea id="f_remarks" rows="3" placeholder="Any issues, delays, notes..."></textarea>
        <label>Attachment (optional — image or PDF)</label>
        <input id="f_attachment" type="file" accept="image/*,.pdf">
        <div class="err" id="entryErr"></div>
        <button class="btn-primary" type="submit">Submit Entry</button>
      </form>
    </div>
  `;
}

// All of my department's entries (everyone, not just me) — shown under the
// New Entry form as reference so I can see what's already been logged today.
function deptEntriesReferenceHtml(deptList) {
  const d = deptMeta(session.department);
  const sorted = [...deptList].sort((a, b) => b.createdAt - a.createdAt);
  const listHtml = sorted.length
    ? feedHtml(sorted, false)
    : `<div class="center">No entries yet for ${escapeHtml(d.label)}.</div>`;
  return `
    <div style="font-size:16px;letter-spacing:1.5px;color:var(--dim);margin:26px 0 10px;text-transform:uppercase;">${escapeHtml(d.label)} — All Entries</div>
    ${listHtml}
  `;
}

function sectionFieldInputHtml(field, idPrefix) {
  const fid = `${idPrefix}_${field.key}`;
  const req = field.required ? "required" : "";
  const placeholder = field.placeholder ? `placeholder="${escapeHtml(field.placeholder)}"` : "";

  if (field.type === "select") {
    const opts = field.options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
    return `<label>${escapeHtml(field.label)}</label><select id="${fid}">${opts}</select>`;
  }
  if (field.type === "textarea") {
    return `<label>${escapeHtml(field.label)}</label><textarea id="${fid}" rows="3" ${placeholder}></textarea>`;
  }
  if (field.type === "date") {
    return `<label>${escapeHtml(field.label)}</label><input id="${fid}" type="date">`;
  }
  if (field.type === "number") {
    return `<label>${escapeHtml(field.label)}</label><input id="${fid}" type="number" min="0" ${req}>`;
  }
  if (field.type === "file") {
    return `<label>${escapeHtml(field.label)}</label><input id="${fid}" type="file" accept="image/*,.pdf" ${req}>`;
  }
  // default: text
  return `<label>${escapeHtml(field.label)}</label><input id="${fid}" type="text" ${req} ${placeholder}>`;
}

function sectionFormHtml(section) {
  const idPrefix = "sec";
  const fieldsHtml = section.fields.map(f => sectionFieldInputHtml(f, idPrefix)).join("");
  // Sections that already declare their own typed "file" field (e.g. T&A
  // Schedule) keep just that one upload control; everyone else gets this
  // universal optional attachment instead, so there's always exactly one.
  const hasFileField = section.fields.some(f => f.type === "file");
  const universalAttachmentHtml = hasFileField ? "" : `
        <label>Attachment (optional — image or PDF)</label>
        <input id="sec_universalAttachment" type="file" accept="image/*,.pdf">
  `;
  return `
    <div class="card">
      <h3>${escapeHtml(section.title)}</h3>
      <form id="sectionForm" data-section-id="${section.id}">
        ${fieldsHtml}
        ${universalAttachmentHtml}
        <div class="err" id="sectionErr"></div>
        <button class="btn-primary" type="submit">Submit Entry</button>
      </form>
    </div>
  `;
}

function sectionEntryCardHtml(entry, section) {
  const d = deptMeta(entry.department);
  const time = new Date(entry.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const rows = section.fields
    .filter(f => {
      const v = entry.values[f.key];
      if (f.type === "file") return v && v.url;
      return v !== undefined && v !== "" && v !== null;
    })
    .map(f => {
      if (f.type === "file") {
        const v = entry.values[f.key];
        return `<span style="margin-right:14px;"><span style="color:var(--amber);">${escapeHtml(f.label).toUpperCase()}</span> <a href="${escapeHtml(v.url)}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:underline;">📎 ${escapeHtml(v.originalName || "file")}</a></span>`;
      }
      return `<span style="margin-right:14px;"><span style="color:var(--amber);">${escapeHtml(f.label).toUpperCase()}</span> <span style="color:var(--dim);">${escapeHtml(entry.values[f.key])}</span></span>`;
    })
    .join("");
  return `
    <div class="entry">
      <div style="display:flex;justify-content:space-between;gap:8px;">
        <div><span class="code">${d.code}</span><b>${escapeHtml(section.title)}</b></div>
        <div style="font-size:11px;color:var(--dim);flex-shrink:0;">${time}</div>
      </div>
      <div class="meta">${rows}</div>
      ${entry.attachment && entry.attachment.url ? `<div class="meta" style="margin-top:6px;"><a href="${escapeHtml(entry.attachment.url)}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:underline;">📎 ${escapeHtml(entry.attachment.originalName || "attachment")}</a></div>` : ""}
      <div class="dl-row">
        <button type="button" class="dl-btn" data-dl-section-entry="${entry.id}" data-dl-section-id="${section.id}" data-dl-fmt="docx">⬇ Word</button>
        <button type="button" class="dl-btn" data-dl-section-entry="${entry.id}" data-dl-section-id="${section.id}" data-dl-fmt="xlsx">⬇ Excel</button>
      </div>
    </div>
  `;
}

function sectionsAreaHtml(mySections) {
  if (!activeSectionId || !mySections.some(s => s.id === activeSectionId)) {
    activeSectionId = mySections[0].id;
  }
  const activeSection = sectionMeta(activeSectionId);

  const chips = mySections.map(s => {
    const shortTitle = s.title.length > 22 ? s.title.slice(0, 22) + "…" : s.title;
    return `<span class="chip ${activeSectionId === s.id ? "active" : ""}" data-section="${s.id}" title="${escapeHtml(s.title)}">${escapeHtml(shortTitle)}</span>`;
  }).join("");

  const sectionList = sectionEntries
    .filter(e => e.sectionId === activeSectionId)
    .sort((a, b) => b.createdAt - a.createdAt);

  const feedHtmlOut = sectionList.length
    ? sectionList.map(e => sectionEntryCardHtml(e, activeSection)).join("")
    : `<div class="center">No entries yet in this section.</div>`;

  const canFill = canFillSection(session, activeSection);
  const enterersLabel = activeSection.fillDepts.map(id => deptMeta(id).label).join(", ");
  const formOrNotice = canFill
    ? sectionFormHtml(activeSection)
    : `
      <div class="card" style="text-align:center;color:var(--dim);">
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;">View only</div>
        <div style="font-size:13px;margin-top:6px;">Entries in this section are logged by ${escapeHtml(enterersLabel)}. You can view them below, but can't add new ones here.</div>
      </div>
    `;

  return `
    <div style="margin:10px 0;">${chips}</div>
    ${formOrNotice}
    <div style="font-size:16px;letter-spacing:1.5px;color:var(--dim);margin:18px 0 10px;text-transform:uppercase;">${escapeHtml(activeSection.title)} — Other Departments' Entries</div>
    ${feedHtmlOut}
  `;
}

function dashboardHtml() {
  const start = todayStartMs();
  const todayEntries = entries.filter(e => e.createdAt >= start);
  const totalMinutes = todayEntries.reduce((s, e) => s + e.timeTakenMinutes, 0);

  const rows = DEPARTMENTS.map(d => {
    const deptEntries = todayEntries.filter(e => e.department === d.id);
    const minutes = deptEntries.reduce((s, e) => s + e.timeTakenMinutes, 0);
    const count = deptEntries.length;
    return `
      <div class="dept-row" style="${count === 0 ? "opacity:.45;" : ""}">
        <span class="code" style="width:36px;">${d.code}</span>
        <span style="flex:1;font-size:13.5px;">${d.label}</span>
        <span style="font-size:12px;color:var(--dim);">${count} ${count === 1 ? "entry" : "entries"} · ${minutes}min</span>
      </div>
    `;
  }).join("");

  const activeDepts = DEPARTMENTS.filter(d => todayEntries.some(e => e.department === d.id)).length;

  return `
    <div class="summary-grid">
      <div class="summary-card"><div class="big">${todayEntries.length}</div><div class="small">ENTRIES TODAY</div></div>
      <div class="summary-card"><div class="big">${activeDepts}/${DEPARTMENTS.length}</div><div class="small">ACTIVE DEPTS</div></div>
      <div class="summary-card"><div class="big">${Math.round(totalMinutes / 60)}h</div><div class="small">WORK LOGGED</div></div>
    </div>
    <div class="report-card">
      <h3>Full Company Report</h3>
      <p>Every department, every section, in one file.</p>
      <div class="report-actions">
        <button type="button" class="dl-btn" data-dl-report="1" data-dl-fmt="docx">⬇ Word (.docx)</button>
        <button type="button" class="dl-btn" data-dl-report="1" data-dl-fmt="xlsx">⬇ Excel (.xlsx)</button>
      </div>
    </div>
    <div style="font-size:16px;letter-spacing:1.5px;color:var(--dim);margin-bottom:10px;text-transform:uppercase;">Department breakdown — today</div>
    ${rows}
  `;
}

function wireMainEvents() {
  document.getElementById("logoutBtn").onclick = logout;

  document.querySelectorAll(".tab").forEach(t => {
    t.onclick = () => { view = t.getAttribute("data-tab"); render(); };
  });

  // Department filter chips (Factory Feed) and Section chips (Sections tab)
  // both use the .chip class for styling, but need different click behavior —
  // distinguish them by which data attribute is present.
  document.querySelectorAll(".chip").forEach(c => {
    if (c.hasAttribute("data-dept")) {
      c.onclick = () => { filterDept = c.getAttribute("data-dept"); render(); };
    } else if (c.hasAttribute("data-section")) {
      c.onclick = () => { activeSectionId = c.getAttribute("data-section"); render(); };
    }
  });

  // Single Factory Feed entry -> Word / Excel
  document.querySelectorAll("[data-dl-entry]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-dl-entry");
      const fmt = btn.getAttribute("data-dl-fmt");
      downloadExport(`/entries/${id}/export?format=${fmt}`, `Entry_${id}.${fmt}`, btn);
    };
  });

  // Single Section entry -> Word / Excel
  document.querySelectorAll("[data-dl-section-entry]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-dl-section-entry");
      const sectionId = btn.getAttribute("data-dl-section-id");
      const fmt = btn.getAttribute("data-dl-fmt");
      downloadExport(`/sections/${sectionId}/entries/${id}/export?format=${fmt}`, `Entry_${id}.${fmt}`, btn);
    };
  });

  // Full company report (admin/MD dashboard) -> Word / Excel, every dept & section
  document.querySelectorAll("[data-dl-report]").forEach(btn => {
    btn.onclick = () => {
      const fmt = btn.getAttribute("data-dl-fmt");
      downloadExport(`/export/all?format=${fmt}`, `Spike_Creations_Full_Report.${fmt}`, btn);
    };
  });

  const form = document.getElementById("entryForm");
  if (form) {
    form.onsubmit = (e) => {
      e.preventDefault();
      const errEl = document.getElementById("entryErr");
      errEl.textContent = "";

      const task = document.getElementById("f_task").value.trim();
      const qty = Number(document.getElementById("f_qty").value);
      const rawTime = Number(document.getElementById("f_time").value);
      const worker = document.getElementById("f_worker").value.trim();

      // Production logs time in mins/hrs/days; everywhere else stores minutes
      // directly. Convert here so timeTakenMinutes is always minutes internally
      // — that keeps the feed, ticker, and admin dashboard totals consistent
      // no matter which unit was used to enter the value.
      const timeUnitEl = document.getElementById("f_time_unit");
      let timeTakenMinutes = isNaN(rawTime) ? 0 : rawTime;
      if (timeUnitEl) {
        const unit = timeUnitEl.value;
        if (unit === "hrs") timeTakenMinutes = rawTime * 60;
        else if (unit === "days") timeTakenMinutes = rawTime * 60 * 24;
        // "mins" needs no conversion
      }
      timeTakenMinutes = Math.round(timeTakenMinutes);

      if (!task || !qty || isNaN(qty) || !worker) {
        errEl.textContent = "Please fill in task, quantity, and worker.";
        return;
      }

      const fields = {
        task,
        quantity: qty,
        unit: document.getElementById("f_unit").value,
        timeTakenMinutes,
        line: document.getElementById("f_line").value,
        worker,
        remarks: document.getElementById("f_remarks").value.trim(),
        styleNumber: document.getElementById("f_style").value.trim(),
        finishingDate: document.getElementById("f_finishing_date") ? document.getElementById("f_finishing_date").value : "",
      };

      const attachmentEl = document.getElementById("f_attachment");
      const attachmentFile = attachmentEl && attachmentEl.files && attachmentEl.files[0];
      if (attachmentFile) {
        const formData = new FormData();
        Object.keys(fields).forEach(k => formData.append(k, fields[k]));
        formData.append("attachment", attachmentFile);
        submitEntry(formData);
      } else {
        submitEntry(fields);
      }
    };
  }

  const sectionForm = document.getElementById("sectionForm");
  if (sectionForm) {
    sectionForm.onsubmit = (e) => {
      e.preventDefault();
      const errEl = document.getElementById("sectionErr");
      errEl.textContent = "";

      const sectionId = sectionForm.getAttribute("data-section-id");
      const section = sectionMeta(sectionId);
      if (!section) return;

      const hasFileField = section.fields.some(f => f.type === "file");
      const universalAttachmentEl = document.getElementById("sec_universalAttachment");
      const universalAttachmentFile = (!hasFileField && universalAttachmentEl && universalAttachmentEl.files && universalAttachmentEl.files[0]) || null;
      let missingRequired = false;

      if (hasFileField || universalAttachmentFile) {
        // Multipart submission: any typed file field goes in under its own
        // field key, the universal optional attachment (if this section
        // doesn't have a typed file field) goes in as "sectionAttachment",
        // and everything else travels as a JSON string in "valuesJson" (see
        // POST /api/sections/:id/entries).
        const formData = new FormData();
        const otherValues = {};
        section.fields.forEach(f => {
          const el = document.getElementById(`sec_${f.key}`);
          if (f.type === "file") {
            const file = el && el.files && el.files[0];
            if (file) formData.append(f.key, file);
            if (f.required && !file) missingRequired = true;
          } else {
            const val = el ? el.value.trim() : "";
            if (f.required && !val) missingRequired = true;
            otherValues[f.key] = val;
          }
        });
        if (missingRequired) {
          errEl.textContent = "Please fill in all required fields.";
          return;
        }
        formData.append("valuesJson", JSON.stringify(otherValues));
        if (universalAttachmentFile) formData.append("sectionAttachment", universalAttachmentFile);
        submitSectionEntry(sectionId, formData);
      } else {
        const values = {};
        section.fields.forEach(f => {
          const el = document.getElementById(`sec_${f.key}`);
          const val = el ? el.value.trim() : "";
          if (f.required && !val) missingRequired = true;
          values[f.key] = val;
        });

        if (missingRequired) {
          errEl.textContent = "Please fill in all required fields.";
          return;
        }

        submitSectionEntry(sectionId, values);
      }
    };
  }
}

async function bootstrap() {
  const savedToken = localStorage.getItem("spike_token");
  const savedUser = localStorage.getItem("spike_user");
  if (savedToken && savedUser) {
    authToken = savedToken;
    session = JSON.parse(savedUser);
    try {
      await loadAllData();
      view = session.isAdmin ? "admin" : "feed";
      const mySections = accessibleSections(session);
      activeSectionId = mySections.length ? mySections[0].id : null;
    } catch (err) {
      // Saved token is stale/expired — fall back to the login screen.
      authToken = null;
      session = null;
      localStorage.removeItem("spike_token");
      localStorage.removeItem("spike_user");
    }
  }
  render();
}

bootstrap();
</script>
